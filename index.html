<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>은퇴 자산 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --blue: #58a6ff; --green: #3fb950; --red: #f85149;
      --orange: #d29922; --purple: #bc8cff; --teal: #39d0d8; --yellow: #e3b341;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

    header { border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 17px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .updated { color: var(--muted); font-size: 12px; }
    .retire-badge { background: rgba(188,140,255,.15); color: var(--purple); border: 1px solid rgba(188,140,255,.3); border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 600; }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; transition: border-color .2s; }
    .live-badge:hover { border-color: var(--blue); color: var(--text); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .live-dot.loading { background: var(--orange); animation: pulse .8s infinite; }
    .live-dot.ok  { background: var(--green); }
    .live-dot.err { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .price-live { font-weight: 700; }
    .chg-pos { color: var(--green); font-size: 11px; }
    .chg-neg { color: var(--red);   font-size: 11px; }
    .fx-bar { font-size: 11px; color: var(--muted); padding: 6px 0 2px; }

    main { max-width: 1320px; margin: 0 auto; padding: 20px 24px; display: grid; gap: 18px; }

    /* KPI */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 900px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; position: relative; overflow: hidden; }
    .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
    .kpi.blue::before { background: var(--blue); }
    .kpi.green::before { background: var(--green); }
    .kpi.purple::before { background: var(--purple); }
    .kpi.orange::before { background: var(--orange); }
    .kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }
    .kpi .value { font-size: 26px; font-weight: 700; line-height: 1.1; }
    .kpi .sub { margin-top: 6px; font-size: 12px; color: var(--muted); }
    .kpi .sub b { color: var(--text); }
    .pos { color: var(--green); } .neg { color: var(--red); }

    /* progress bar */
    .prog-wrap { margin-top: 10px; }
    .prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .prog-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* chart grid */
    .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .row-3col { display: grid; grid-template-columns: 320px 1fr 1fr; gap: 18px; }
    @media (max-width: 1000px) { .row-3col, .row-2col { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }

    .chart-h200 { position: relative; height: 200px; }
    .chart-h240 { position: relative; height: 240px; }
    .chart-h260 { position: relative; height: 260px; }

    /* donut + legend */
    .donut-layout { display: flex; gap: 14px; align-items: center; }
    .donut-layout canvas { flex-shrink: 0; }
    .legend { display: flex; flex-direction: column; gap: 9px; flex: 1; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-pct { margin-left: auto; font-weight: 700; font-size: 13px; }

    /* retire timeline */
    .timeline { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 14px; }
    .tl-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
    .tl-age { font-size: 18px; font-weight: 700; color: var(--blue); }
    .tl-year { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .tl-amount { font-size: 13px; font-weight: 600; }
    .tl-sources { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.6; }

    /* table */
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(88,166,255,.05); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 9px 12px; white-space: nowrap; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-g { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-r { background: rgba(248,81,73,.15); color: var(--red); }
    .badge-b { background: rgba(88,166,255,.15); color: var(--blue); }

    /* section divider */
    .section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 4px 0; border-bottom: 1px solid var(--border); }

    /* irp row */
    .irp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .irp-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .irp-name { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .irp-val { font-size: 15px; font-weight: 700; }
    .irp-ret { font-size: 12px; margin-top: 3px; }
  </style>
</head>
<body>

<header>
  <h1>은퇴 자산 대시보드</h1>
  <div class="header-right">
    <span class="retire-badge">목표 50세 조기은퇴</span>
    <button class="live-badge" id="live-btn" onclick="fetchLivePrices()" title="클릭하여 새로고침">
      <span class="live-dot" id="live-dot"></span>
      <span id="live-label">실시간 시세</span>
    </button>
    <span class="updated" id="updated-at"></span>
  </div>
</header>

<!-- 데이터 주입 지점 -->

<main>
  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi blue">
      <div class="label">총 자산</div>
      <div class="value" id="kpi-total"></div>
      <div class="sub" id="kpi-total-sub"></div>
    </div>
    <div class="kpi green">
      <div class="label">월 배당수입</div>
      <div class="value pos" id="kpi-div"></div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="div-fill" style="background:var(--green)"></div></div>
        <div class="prog-label"><span>목표: 150만원</span><span id="div-pct"></span></div>
      </div>
    </div>
    <div class="kpi purple">
      <div class="label">IRP + 연금저축</div>
      <div class="value" id="kpi-irp"></div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="irp-fill" style="background:var(--purple)"></div></div>
        <div class="prog-label"><span>목표: 1억</span><span id="irp-pct"></span></div>
      </div>
    </div>
    <div class="kpi orange">
      <div class="label">퇴직금 적립</div>
      <div class="value" id="kpi-retire"></div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="retire-fill" style="background:var(--orange)"></div></div>
        <div class="prog-label"><span>목표: 3억</span><span id="retire-pct"></span></div>
      </div>
    </div>
  </div>

  <!-- 은퇴 소득 플랜 타임라인 -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--purple)"></span>은퇴 소득 플랜 — 나이별 월수입</div>
    <div class="timeline" id="timeline"></div>
    <div class="chart-h200"><canvas id="retireChart"></canvas></div>
  </div>

  <!-- 자산 구성 + 배당 월수입 -->
  <div class="row-2col">
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--blue)"></span>자산 구성</div>
      <div class="donut-layout">
        <canvas id="assetDonut" width="160" height="160" style="max-width:160px;max-height:160px;"></canvas>
        <div class="legend" id="asset-legend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--green)"></span>종목별 월 배당금</div>
      <div class="chart-h240"><canvas id="divBarChart"></canvas></div>
    </div>
  </div>

  <!-- 배당주식 테이블 -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--teal)"></span>배당주식 보유현황</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>티커</th><th>종목명</th><th>주수</th>
            <th>현재가(USD) <span id="fx-label" class="fx-bar"></span></th>
            <th>전일대비</th><th>평가액(원)</th><th>배당수익률</th><th>월 배당금</th><th>연 배당금</th>
          </tr>
        </thead>
        <tbody id="div-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- IRP / 연금저축 -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--purple)"></span>IRP · 연금저축 현황 (기준: 2025-11-05)</div>
    <div class="irp-grid" id="irp-grid"></div>
  </div>

</main>

<script>
(function () {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmtW  = n => n.toLocaleString('ko-KR') + '원';
  const fmtM  = n => (n >= 1e8 ? (n/1e8).toFixed(1)+'억' : (n >= 1e4 ? Math.round(n/1e4)+'만' : n.toLocaleString()) ) + '원';
  const fmtP  = (n, fix=1) => (n>=0?'+':'') + n.toFixed(fix) + '%';

  const DATA = JSON.parse(document.getElementById('portfolio-data').textContent);
  const S = DATA.summary;

  document.getElementById('updated-at').textContent =
    '기준: ' + DATA.asOf + '  |  조회: ' + new Date().toLocaleDateString('ko-KR');

  // ── KPI ──
  document.getElementById('kpi-total').textContent = fmtM(S.totalAssets);
  document.getElementById('kpi-total-sub').innerHTML = `채권·주식·현금·남편·전세 합산`;

  document.getElementById('kpi-div').textContent = fmtW(S.monthlyDividend);
  const divPct = Math.min((S.monthlyDividend / S.monthlyDividendTarget) * 100, 100);
  document.getElementById('div-fill').style.width = divPct + '%';
  document.getElementById('div-pct').textContent = divPct.toFixed(1) + '%';

  document.getElementById('kpi-irp').textContent = fmtM(S.irpTotal);
  const irpPct = Math.min((S.irpTotal / S.irpTarget) * 100, 100);
  document.getElementById('irp-fill').style.width = irpPct + '%';
  document.getElementById('irp-pct').textContent = irpPct.toFixed(1) + '%';

  document.getElementById('kpi-retire').textContent = fmtM(S.retirementFund);
  const retPct = Math.min((S.retirementFund / S.retirementFundTarget) * 100, 100);
  document.getElementById('retire-fill').style.width = retPct + '%';
  document.getElementById('retire-pct').textContent = retPct.toFixed(1) + '%';

  // ── 타임라인 ──
  const tl = document.getElementById('timeline');
  DATA.retirePlan.forEach(p => {
    tl.innerHTML += `<div class="tl-item">
      <div class="tl-age">${esc(String(p.age))}세</div>
      <div class="tl-year">${esc(String(p.year))}년</div>
      <div class="tl-amount pos">${fmtW(p.monthly)}</div>
      <div class="tl-sources">${p.sources.map(s=>esc(s)).join('<br>')}</div>
    </div>`;
  });

  // ── 은퇴 소득 바 차트 ──
  const retCtx = document.getElementById('retireChart').getContext('2d');
  new Chart(retCtx, {
    type: 'bar',
    data: {
      labels: DATA.retirePlan.map(p => p.age + '세'),
      datasets: [
        { label: 'IRP배당',    data: [509800,509800,509800,509800,509800,509800], backgroundColor: 'rgba(88,166,255,.8)', borderRadius: 3 },
        { label: '배당주식',   data: [1500000,1500000,1500000,1500000,1500000,1500000], backgroundColor: 'rgba(63,185,80,.8)', borderRadius: 3 },
        { label: '퇴직연금',   data: [0,1250000,1250000,1250000,1250000,1250000], backgroundColor: 'rgba(188,140,255,.8)', borderRadius: 3 },
        { label: 'RI연금',     data: [0,0,0,300000,600000,600000], backgroundColor: 'rgba(210,153,34,.8)', borderRadius: 3 },
        { label: '국민연금',   data: [0,0,0,0,0,1000000], backgroundColor: 'rgba(57,208,216,.8)', borderRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmtW(ctx.parsed.y) } }
      },
      scales: {
        x: { stacked: true, grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
        y: { stacked: true, grid: { color: '#21262d' }, ticks: { color: '#8b949e', callback: v => (v/10000) + '만' } }
      }
    }
  });

  // ── 자산 구성 도넛 ──
  const PALETTE = ['#58a6ff','#3fb950','#bc8cff','#d29922','#39d0d8','#f85149'];
  const aCtx = document.getElementById('assetDonut').getContext('2d');
  const totalA = DATA.assetAllocation.reduce((s,a)=>s+a.value,0);
  new Chart(aCtx, {
    type: 'doughnut',
    data: {
      labels: DATA.assetAllocation.map(a=>a.name),
      datasets: [{ data: DATA.assetAllocation.map(a=>a.value), backgroundColor: PALETTE, borderColor: '#161b22', borderWidth: 3, hoverOffset: 5 }]
    },
    options: {
      responsive: false, cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtM(ctx.parsed) } } }
    }
  });
  const legEl = document.getElementById('asset-legend');
  DATA.assetAllocation.forEach((a,i) => {
    const pct = ((a.value/totalA)*100).toFixed(1);
    legEl.innerHTML += `<div class="legend-item">
      <span class="leg-dot" style="background:${esc(PALETTE[i])}"></span>
      <span>${esc(a.name)}</span>
      <span class="leg-pct" style="color:${esc(PALETTE[i])}">${esc(pct)}%</span>
    </div>`;
  });

  // ── 배당 바 차트 ──
  const dCtx = document.getElementById('divBarChart').getContext('2d');
  new Chart(dCtx, {
    type: 'bar',
    data: {
      labels: DATA.dividendHoldings.map(h=>h.ticker),
      datasets: [{
        label: '월 배당금',
        data: DATA.dividendHoldings.map(h=>h.monthlyDiv),
        backgroundColor: ['rgba(88,166,255,.75)','rgba(63,185,80,.75)','rgba(188,140,255,.75)','rgba(210,153,34,.75)'],
        borderColor:     ['#58a6ff','#3fb950','#bc8cff','#d29922'],
        borderWidth: 1, borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtW(ctx.parsed.y) } } },
      scales: {
        x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
        y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e', callback: v => (v/10000)+'만' }, grace: '10%' }
      }
    }
  });

  // ── 배당주식 테이블 ──
  const tbody = document.getElementById('div-tbody');
  let totalMthDiv = 0, totalAnnDiv = 0, totalVal = 0;
  DATA.dividendHoldings.forEach(h => {
    const val = h.shares * h.priceKrw;
    totalMthDiv += h.monthlyDiv; totalAnnDiv += h.annualDiv; totalVal += val;
    tbody.innerHTML += `<tr id="row-${esc(h.ticker)}">
      <td><strong>${esc(h.ticker)}</strong></td>
      <td style="color:var(--muted)">${esc(h.name)}</td>
      <td>${h.shares.toLocaleString()}</td>
      <td id="price-${esc(h.ticker)}" class="price-live">$${esc(String(h.price))}</td>
      <td id="chg-${esc(h.ticker)}" style="color:var(--muted)">—</td>
      <td id="val-${esc(h.ticker)}">${fmtW(val)}</td>
      <td><span class="badge badge-b">${esc(String(h.divYield))}%</span></td>
      <td class="pos"><strong>${fmtW(h.monthlyDiv)}</strong></td>
      <td style="color:var(--muted)">${fmtW(h.annualDiv)}</td>
    </tr>`;
  });
  tbody.innerHTML += `<tr id="row-total" style="border-top:2px solid var(--border);font-weight:700">
    <td colspan="4" style="color:var(--muted)">합계</td>
    <td></td>
    <td id="val-total">${fmtW(totalVal)}</td>
    <td>—</td>
    <td class="pos">${fmtW(totalMthDiv)}</td>
    <td style="color:var(--muted)">${fmtW(totalAnnDiv)}</td>
  </tr>`;

  // ── IRP 그리드 ──
  const irpGrid = document.getElementById('irp-grid');
  const totalIrpPrin = DATA.irpAccounts.reduce((s,a)=>s+a.principal,0);
  const totalIrpVal  = DATA.irpAccounts.reduce((s,a)=>s+a.value,0);
  DATA.irpAccounts.forEach(a => {
    const pnl = a.value - a.principal;
    irpGrid.innerHTML += `<div class="irp-item">
      <div class="irp-name">${esc(a.name)}</div>
      <div class="irp-val">${fmtW(a.value)}</div>
      <div class="irp-ret pos">수익률 +${esc(String(a.returnPct))}% &nbsp; <span style="color:var(--muted)">(+${fmtW(pnl)})</span></div>
    </div>`;
  });
  irpGrid.innerHTML += `<div class="irp-item" style="border-color:var(--purple)">
    <div class="irp-name" style="color:var(--purple)">합계 (목표: 1억)</div>
    <div class="irp-val" style="color:var(--purple)">${fmtW(totalIrpVal)}</div>
    <div class="irp-ret">
      <div class="prog-bar" style="margin-top:6px"><div class="prog-fill" style="background:var(--purple);width:${((totalIrpVal/100000000)*100).toFixed(1)}%"></div></div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${((totalIrpVal/100000000)*100).toFixed(1)}% 달성</div>
    </div>
  </div>`;
  // ── 실시간 시세 연동 ──
  // Cloudflare Pages 여부 감지
  const isCloudflare = location.hostname.endsWith('.pages.dev');

  async function fetchYahooDirect(ticker) {
    const PROXY = 'https://corsproxy.io/?url=';
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const res = await fetch(PROXY + encodeURIComponent(url));
    const data = await res.json();
    const meta = data.chart.result[0].meta;
    return {
      price: meta.regularMarketPrice,
      prevClose: meta.chartPreviousClose,
      change: meta.regularMarketPrice - meta.chartPreviousClose,
      changePct: ((meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose) * 100,
    };
  }

  window.fetchLivePrices = async function () {
    const dot   = document.getElementById('live-dot');
    const label = document.getElementById('live-label');
    dot.className = 'live-dot loading';
    label.textContent = '불러오는 중...';

    try {
      let prices;

      if (isCloudflare) {
        // Cloudflare Worker 백엔드 사용
        const res = await fetch('/api/prices');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        prices = await res.json();
        if (prices.error) throw new Error(prices.error);
      } else {
        // GitHub Pages — Yahoo Finance 직접 호출 (CORS 프록시)
        const tickers = ['JEPQ', 'O', 'SCHD', 'NVDY', 'USDKRW=X'];
        const results = await Promise.all(tickers.map(t => fetchYahooDirect(t)));
        prices = {};
        tickers.forEach((t, i) => {
          const key = t === 'USDKRW=X' ? 'USDKRW' : t;
          prices[key] = results[i];
        });
      }

      const usdkrw = prices.USDKRW?.price ?? 1380;
      document.getElementById('fx-label').textContent = `환율 ₩${usdkrw.toFixed(0)}`;

      let newTotalVal = 0;
      DATA.dividendHoldings.forEach(h => {
        const q = prices[h.ticker];
        if (!q) return;

        const priceUsd = q.price;
        const priceKrw = priceUsd * usdkrw;
        const val = h.shares * priceKrw;
        newTotalVal += val;

        const chgPct = q.changePct;
        const chgClass = chgPct >= 0 ? 'chg-pos' : 'chg-neg';
        const chgSign  = chgPct >= 0 ? '+' : '';

        const priceEl = document.getElementById('price-' + h.ticker);
        const chgEl   = document.getElementById('chg-'   + h.ticker);
        const valEl   = document.getElementById('val-'   + h.ticker);

        if (priceEl) priceEl.innerHTML =
          `$${priceUsd.toFixed(2)} <span class="${chgClass}">${chgSign}${chgPct.toFixed(2)}%</span>`;
        if (chgEl) chgEl.innerHTML =
          `<span class="${chgClass}">${chgSign}$${q.change.toFixed(2)}</span>`;
        if (valEl) valEl.textContent = fmtW(Math.round(val));
      });

      const totalValEl = document.getElementById('val-total');
      if (totalValEl) totalValEl.textContent = fmtW(Math.round(newTotalVal));

      dot.className = 'live-dot ok';
      const t = new Date();
      label.textContent = t.getHours() + ':' + String(t.getMinutes()).padStart(2,'0') + ' 업데이트';

      // 5분 후 자동 새로고침
      setTimeout(window.fetchLivePrices, 5 * 60 * 1000);

    } catch (err) {
      dot.className = 'live-dot err';
      label.textContent = '시세 연결 실패 (클릭하여 재시도)';
      console.warn('[live prices]', err.message);
    }
  };

  // 배포 환경에서만 자동 실행
  if (location.protocol !== 'file:') {
    fetchLivePrices();
  } else {
    document.getElementById('live-label').textContent = '배포 후 실시간 연동';
  }

})();
</script>
</body>
</html>
