<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>은퇴 관제탑 — Road to 2028</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --page:#0d0d0f; --surface:#16181d; --surface2:#1c1f26; --line:#2c2c2a; --hairline:rgba(255,255,255,.10);
  --ink:#ffffff; --ink2:#c3c2b7; --mut:#898781;
  --gold:#e8b84b; --gold-dim:#8a6f2e;
  --up:#e66767; --dn:#3987e5;               /* 국내 관례: 상승 빨강 / 하락 파랑 */
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767;
  --ok:#0ca30c;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;
  --sans:'IBM Plex Sans KR',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--page);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;
  padding:14px 14px calc(40px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto;
  background-image:radial-gradient(1200px 500px at 50% -200px,#1a2030 0%,transparent 60%)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.up{color:var(--up)} .dn{color:var(--dn)} .mut{color:var(--mut)}
section{background:var(--surface);border:1px solid var(--hairline);border-radius:16px;padding:16px;margin-bottom:14px}
h2{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:12px}

/* ── 헤더 ── */
header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:4px 2px 16px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
header h1 em{font-style:normal;color:var(--gold)}
.dday{font-family:var(--mono);font-size:11px;color:var(--gold);border:1px solid var(--gold-dim);border-radius:99px;padding:3px 10px;white-space:nowrap}
.refresh{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut);cursor:pointer;
  background:var(--surface);border:1px solid var(--hairline);border-radius:99px;padding:4px 11px;font-family:var(--sans)}
.refresh .dot{width:7px;height:7px;border-radius:50%;background:var(--mut);flex-shrink:0}
.refresh .dot.loading{background:var(--gold);animation:pulse .8s infinite}
.refresh .dot.ok{background:var(--ok)} .refresh .dot.err{background:var(--up)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

/* ── 히어로 ── */
#hero{background:linear-gradient(180deg,#1a1e28,#14171d);position:relative;overflow:hidden}
#hero::after{content:'';position:absolute;inset:auto -30% -60% -30%;height:120px;
  background:radial-gradient(closest-side,rgba(232,184,75,.13),transparent);pointer-events:none}
.hero-label{font-size:11px;color:var(--mut);letter-spacing:1.6px;text-transform:uppercase}
.hero-value{font-family:var(--mono);font-size:clamp(30px,9vw,42px);font-weight:600;letter-spacing:-1px;
  color:var(--gold);line-height:1.15;margin:4px 0 2px}
.hero-sub{font-size:12px;color:var(--ink2)}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.hcell{background:rgba(255,255,255,.03);border:1px solid var(--hairline);border-radius:10px;padding:8px 10px;min-width:0}
.hcell .lb{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcell .vl{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:2px;white-space:nowrap}

/* ── 매크로 핵심지표 ── */
.macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:560px){.macro-grid{grid-template-columns:repeat(4,1fr)}}
.mcell{background:var(--surface2);border:1px solid var(--hairline);border-radius:12px;padding:11px 12px;min-width:0}
.mcell .lb{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mcell .vl{font-family:var(--mono);font-size:17px;font-weight:600;margin:3px 0 5px;white-space:nowrap}
.chip{display:inline-block;font-family:var(--mono);font-size:10px;border-radius:5px;padding:1px 6px}
.chip.up-bg{background:rgba(230,103,103,.16);color:var(--up)}
.chip.dn-bg{background:rgba(57,135,229,.16);color:var(--dn)}
.spark{margin-top:7px;height:26px}
.spark svg{width:100%;height:26px;display:block}

/* ── 목표 게이지 ── */
.goal{margin-bottom:14px}
.goal:last-child{margin-bottom:0}
.goal-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:12px;margin-bottom:5px}
.goal-head b{font-weight:600}
.goal-head .num{font-size:11px;color:var(--ink2)}
.bar{height:8px;background:#0e1014;border:1px solid var(--line);border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));
  transition:width .8s cubic-bezier(.2,.8,.2,1);min-width:2px}
.goal.done .bar i{background:linear-gradient(90deg,#0a7a0a,var(--ok))}
.goal-pct{font-family:var(--mono);color:var(--gold)}
.goal.done .goal-pct{color:var(--ok)}

/* ── 은퇴 소득 플랜 ── */
.plan-wrap{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;align-items:end;height:170px;margin:26px 0 6px}
.plan-col{display:flex;flex-direction:column-reverse;gap:2px;height:100%;justify-content:flex-start;position:relative}
.plan-col .seg{border-radius:3px;min-height:3px}
.plan-col .top{position:absolute;top:-20px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink2);white-space:nowrap}
.plan-lb{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;text-align:center;margin-top:6px}
.plan-lb .age{font-family:var(--mono);font-size:12px;font-weight:600}
.plan-lb .yr{font-family:var(--mono);font-size:10px;color:var(--mut)}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.legend i{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* ── 계좌별 자산 ── */
.acct{margin-bottom:10px}
.acct:last-child{margin-bottom:0}
.acct-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.acct-head .num{color:var(--ink2);font-size:11px}
.acct .bar{height:10px}
.acct .bar i{background:var(--s1);border-radius:99px 3px 3px 99px}

/* ── 보유종목 ── */
.grp{margin-bottom:6px}
.grp-head{display:flex;justify-content:space-between;align-items:baseline;padding:10px 2px 6px;border-bottom:1px solid var(--line);margin-bottom:2px}
.grp-head b{font-size:13px;font-weight:600}
.grp-head .num{font-size:11px;color:var(--ink2)}
.h-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.05)}
.h-row:last-child{border-bottom:none}
.h-name{flex:1;min-width:0}
.h-name b{font-size:13px;font-weight:500;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-name small{font-family:var(--mono);font-size:10px;color:var(--mut)}
.h-val{text-align:right;flex-shrink:0}
.h-val .v{font-family:var(--mono);font-size:13px;font-weight:600}
.h-val .c{font-family:var(--mono);font-size:11px}
.stale{opacity:.55}
.badge-est{font-size:9px;color:var(--mut);border:1px solid var(--line);border-radius:4px;padding:0 4px;vertical-align:2px}

/* ── 배당 ── */
.div-note{font-size:11px;color:var(--mut);margin-top:10px;line-height:1.7}
footer{font-size:11px;color:var(--mut);text-align:center;line-height:1.9;margin-top:18px}
footer a{color:var(--ink2)}
#status-line{font-family:var(--mono);font-size:10px;color:var(--mut);text-align:center;margin-top:6px;word-break:break-all}
@media(max-width:420px){
  .hero-grid{grid-template-columns:repeat(3,1fr)}
  .plan-wrap{height:140px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <h1>은퇴 <em>관제탑</em></h1>
  <span class="dday" id="dday">D-…</span>
  <button class="refresh" id="refresh-btn" onclick="loadAll(true)">
    <span class="dot" id="dot"></span><span id="dot-label">불러오는 중</span>
  </button>
</header>

<section id="hero">
  <div class="hero-label">총 투자자산 (5개 계좌 실시간)</div>
  <div class="hero-value num" id="total">—</div>
  <div class="hero-sub" id="total-sub">구글시트 데이터를 불러오는 중…</div>
  <div class="hero-grid" id="hero-grid"></div>
</section>

<section>
  <h2>매크로 핵심지표 <span class="mut" style="text-transform:none;letter-spacing:0">— 모닝 브리핑 연동</span></h2>
  <div class="macro-grid" id="macro-grid"><div class="mcell"><div class="lb">불러오는 중…</div></div></div>
</section>

<section>
  <h2>목표 활주로</h2>
  <div id="goals"></div>
</section>

<section>
  <h2>은퇴 소득 플랜 — 나이별 월수입</h2>
  <div class="plan-wrap" id="plan"></div>
  <div class="plan-lb" id="plan-lb"></div>
  <div class="legend" id="plan-legend"></div>
</section>

<section>
  <h2>계좌별 자산</h2>
  <div id="accts"></div>
</section>

<section>
  <h2>보유종목</h2>
  <div id="holdings"></div>
  <div class="div-note" id="fx-note"></div>
</section>

<footer>
  데이터: <a href="https://docs.google.com/spreadsheets/d/1BwTaVxnPvMJ4E90FADDl7JjlO6Yrt0E0toDPi99wCG0/edit" target="_blank" rel="noopener">구글시트 (은퇴대시보드_데이터_v2)</a> · 시세: Yahoo Finance<br>
  종목 변경은 시트에서 행만 수정하면 자동 반영됩니다
  <div id="status-line"></div>
</footer>

<script>
'use strict';
/* ══════════ 설정 ══════════ */
const SHEET_ID = '1BwTaVxnPvMJ4E90FADDl7JjlO6Yrt0E0toDPi99wCG0';
const SHEET_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
];
const RETIRE_DATE = new Date(2028, 4, 1);          // 2028-05 1차 작은은퇴
const AGE_ANCHOR = { age: 48, year: 2028 };        // 나이→연도 환산 기준
const QUOTE_TTL = 10 * 60 * 1000;                  // 시세 캐시 10분
const PLAN_COLORS = { '배당주식':'var(--s1)','ISA계좌':'var(--s2)','퇴직연금':'var(--s3)','RI연금1':'var(--s4)','RI연금2':'var(--s5)','국민연금':'var(--s6)' };
/* 모닝 브리핑(fetch_data.py)과 동일한 매크로 지표 세트 */
const MACROS = [
  { sym:'^KS11',   name:'코스피',            fmt:v=>v.toLocaleString('ko-KR',{maximumFractionDigits:2}) },
  { sym:'KRW=X',   name:'원/달러 환율',       fmt:v=>'₩'+v.toFixed(1) },
  { sym:'^SOX',    name:'필라델피아 반도체',   fmt:v=>v.toLocaleString('en-US',{maximumFractionDigits:1}) },
  { sym:'^TNX',    name:'미 국채 10년물',     fmt:v=>v.toFixed(2)+'%' },
  { sym:'^STOXX',  alt:'^STOXX50E', name:'유럽 STOXX', fmt:v=>v.toLocaleString('en-US',{maximumFractionDigits:1}) },
  { sym:'BTC-USD', name:'비트코인',           fmt:v=>'$'+Math.round(v).toLocaleString('en-US') },
  { sym:'HYG',     name:'하이일드 HYG',       fmt:v=>'$'+v.toFixed(2) },
  { sym:'SOXL',    name:'SOXL (세븐스플릿)',  fmt:v=>'$'+v.toFixed(2) },
];

const $ = id => document.getElementById(id);
const fmtW = n => Math.round(n).toLocaleString('ko-KR') + '원';
const fmtM = n => n >= 1e8 ? (n/1e8).toFixed(2).replace(/\.?0+$/,'') + '억' : Math.round(n/1e4).toLocaleString() + '만';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num = v => { const n = Number(String(v ?? '').replace(/[^0-9.\-]/g,'')); return isFinite(n) && String(v).trim() !== '' ? n : null; };

/* ══════════ 유틸: 프록시 fetch ══════════ */
async function fetchVia(url) {
  let lastErr;
  for (let round = 0; round < 2; round++) {          // 프록시 일시 오류 대비 2회전
    for (const wrap of PROXIES) {
      try {
        const res = await fetch(wrap(url), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        if (!text || text.startsWith('error code:') || text.startsWith('<html')) throw new Error('proxy error');
        return text;
      } catch (e) { lastErr = e; }
    }
  }
  throw lastErr || new Error('fetch failed');
}

/* ══════════ CSV 파서 (따옴표·쉼표 처리) ══════════ */
function parseCSV(text) {
  const rows = []; let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ',') { row.push(cell); cell = ''; }
    else if (ch === '\n' || ch === '\r') {
      if (ch === '\r' && text[i+1] === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(c => c.trim() !== '')) rows.push(row);
      row = [];
    } else cell += ch;
  }
  row.push(cell);
  if (row.some(c => c.trim() !== '')) rows.push(row);
  return rows;
}

/* 헤더 이름 → 컬럼 인덱스 (열 순서·이름 변형에 견딤) */
function mapCols(header) {
  const find = (...keys) => header.findIndex(h => keys.some(k => String(h).trim().includes(k)));
  return {
    sec:  find('구분','섹션'),   key:  find('티커','키'),
    name: find('이름'),          acct: find('계좌'),
    mkt:  find('시장'),          qty:  find('수량'),
    amt:  find('금액'),          yld:  find('배당'),
    memo: find('메모'),
  };
}

/* ══════════ 시트 → 모델 ══════════ */
function buildModel(rows) {
  const c = mapCols(rows[0]);
  const cell = (r, i) => i >= 0 ? String(r[i] ?? '').trim() : '';
  const M = { holdings: [], cash: [], snapshots: {}, targets: {}, plan: {}, settings: {} };
  for (const r of rows.slice(1)) {
    const sec = cell(r, c.sec);
    const key = cell(r, c.key), name = cell(r, c.name), acct = cell(r, c.acct);
    const mkt = cell(r, c.mkt).toUpperCase(), qty = num(cell(r, c.qty)), amt = num(cell(r, c.amt));
    const yld = num(cell(r, c.yld)), memo = cell(r, c.memo);
    if (sec === '보유종목') {
      M.holdings.push({ key, name, acct, mkt, qty: qty ?? 0, avg: amt ?? 0, yld, memo });
    } else if (sec === '현금') {
      M.cash.push({ name, acct, mkt, usd: mkt === 'US' ? (qty ?? 0) : 0, krw: mkt === 'US' ? 0 : (amt ?? 0) });
    } else if (sec === '계좌스냅샷') {
      M.snapshots[name] = { value: amt ?? 0, acct, memo };
    } else if (sec === '목표') {
      M.targets[name] = amt ?? 0;
    } else if (sec === '은퇴플랜') {
      const age = num(key); if (age == null) continue;
      (M.plan[age] = M.plan[age] || []).push({ source: name, amount: amt ?? 0 });
    } else if (sec === '설정') {
      M.settings[name] = memo || amt || '';
    }
  }
  return M;
}

/* ══════════ 시세 (Yahoo, 프록시 경유, 캐시) ══════════ */
function yahooSymbols(h) {
  if (h.mkt === 'KR') {
    const code = String(h.key).replace(/\D/g,'').padStart(6,'0');
    return code.length === 6 && num(h.key) != null ? [code + '.KS', code + '.KQ'] : [];
  }
  return /^[A-Z.\-=]{1,10}$/.test(h.key) ? [h.key] : [];
}
const _inflight = {};
function getQuote(sym) {                    // 동시 중복 요청 합치기
  return _inflight[sym] ??= _getQuote(sym).finally(() => delete _inflight[sym]);
}
async function _getQuote(sym) {
  const ck = 'q_' + sym;
  try { const c = JSON.parse(localStorage.getItem(ck) || 'null');
        if (c && Date.now() - c.t < QUOTE_TTL) return c.q; } catch(e){}
  const text = await fetchVia(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`);
  const meta = JSON.parse(text)?.chart?.result?.[0]?.meta;
  if (!meta || meta.regularMarketPrice == null) throw new Error('no data');
  const q = { price: meta.regularMarketPrice,
              chgPct: meta.chartPreviousClose ? (meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose * 100 : null,
              cur: meta.currency };
  try { localStorage.setItem(ck, JSON.stringify({ t: Date.now(), q })); } catch(e){}
  return q;
}
/* 코스피/코스닥 접미사가 틀리면 야후가 엉뚱한 종목을 줄 수 있어
   평단가 대비 1/3~3배 밴드로 검증하고, 밴드 밖이면 평단에 가장 가까운 후보 선택 */
async function getQuoteWithFallback(h, fx) {
  const candidates = [];
  for (const sym of yahooSymbols(h)) {
    try {
      const q = await getQuote(sym);
      const p = q.cur === 'USD' ? q.price * fx : q.price;
      if (!h.avg || (p > h.avg / 3 && p < h.avg * 3)) return q;
      candidates.push({ q, dist: Math.abs(Math.log(p / h.avg)) });
    } catch (e) {}
  }
  candidates.sort((a, b) => a.dist - b.dist);
  return candidates[0]?.q ?? null; // 전부 실패 → 평단가로 추정
}
async function pooled(items, fn, size = 6) {
  const out = new Array(items.length); let i = 0;
  await Promise.all(Array.from({ length: Math.min(size, items.length) }, async () => {
    while (i < items.length) { const idx = i++; out[idx] = await fn(items[idx]); }
  }));
  return out;
}

/* ══════════ 매크로 지표 ══════════ */
async function getMacro(sym) {
  const ck = 'm_' + sym;
  try { const c = JSON.parse(localStorage.getItem(ck) || 'null');
        if (c && Date.now() - c.t < QUOTE_TTL) return c.d; } catch(e){}
  const text = await fetchVia(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1mo`);
  const r = JSON.parse(text)?.chart?.result?.[0], meta = r?.meta;
  if (!meta || meta.regularMarketPrice == null) throw new Error('no data');
  const closes = (r.indicators?.quote?.[0]?.close || []).filter(v => v != null);
  const prev = closes.length > 1 ? closes[closes.length - 2] : meta.chartPreviousClose;
  const d = { price: meta.regularMarketPrice,
              chgPct: prev ? (meta.regularMarketPrice - prev) / prev * 100 : null, closes };
  try { localStorage.setItem(ck, JSON.stringify({ t: Date.now(), d })); } catch(e){}
  return d;
}
function spark(closes) {
  const w = 100, hgt = 26;
  const min = Math.min(...closes), max = Math.max(...closes), rng = max - min || 1;
  const pts = closes.map((c, i) => [i / (closes.length - 1) * w, hgt - 2 - (c - min) / rng * (hgt - 4)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join('');
  return `<svg viewBox="0 0 ${w} ${hgt}" preserveAspectRatio="none" aria-hidden="true">
    <path d="${line}L${w},${hgt}L0,${hgt}Z" fill="rgba(57,135,229,.16)"/>
    <path d="${line}" fill="none" stroke="#5a9bea" stroke-width="1.3" vector-effect="non-scaling-stroke"/></svg>`;
}
async function loadMacros() {
  const res = await pooled(MACROS, async m => {
    try { return await getMacro(m.sym); }
    catch (e) { if (m.alt) { try { return await getMacro(m.alt); } catch (e2) {} } return null; }
  }, 4);
  $('macro-grid').innerHTML = MACROS.map((m, i) => {
    const d = res[i];
    if (!d) return `<div class="mcell"><div class="lb">${m.name}</div><div class="vl mut">—</div></div>`;
    const up = (d.chgPct ?? 0) >= 0;
    return `<div class="mcell"><div class="lb">${m.name}</div><div class="vl">${m.fmt(d.price)}</div>
      <span class="chip ${up ? 'up-bg' : 'dn-bg'}">${up ? '▲' : '▼'} ${d.chgPct == null ? '—' : Math.abs(d.chgPct).toFixed(2) + '%'}</span>
      <div class="spark">${d.closes.length > 2 ? spark(d.closes) : ''}</div></div>`;
  }).join('');
}

/* ══════════ 렌더 ══════════ */
function renderDday() {
  const d = Math.ceil((RETIRE_DATE - new Date()) / 864e5);
  $('dday').textContent = `1차 작은은퇴 D-${d}`;
}

function render(M, quotes, fx) {
  /* 종목별 평가액 계산 */
  let liveCount = 0;
  M.holdings.forEach((h, i) => {
    const q = quotes[i];
    if (q) {
      h.price = q.cur === 'USD' ? q.price * fx : q.price;
      h.chgPct = q.chgPct; h.est = false; liveCount++;
    } else { h.price = h.avg; h.chgPct = null; h.est = true; }
    h.value = h.qty * h.price;
    h.cost = h.qty * h.avg;
  });
  const cashKrw = M.cash.reduce((s, csh) => s + csh.krw + csh.usd * fx, 0);
  const stockTotal = M.holdings.reduce((s, h) => s + h.value, 0);
  const total = stockTotal + cashKrw;
  const cost = M.holdings.reduce((s, h) => s + h.cost, 0);
  const pnl = stockTotal - cost;

  /* 히어로 */
  $('total').textContent = fmtW(total);
  const pnlPct = cost ? (pnl / cost * 100) : 0;
  $('total-sub').innerHTML = `평가손익 <b class="num ${pnl >= 0 ? 'up' : 'dn'}">${pnl >= 0 ? '+' : ''}${fmtW(pnl)} (${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%)</b>`;
  const sev = M.snapshots['퇴직금 적립액'];
  $('hero-grid').innerHTML = [
    ['주식·ETF', fmtM(stockTotal)],
    ['예수금', fmtM(cashKrw)],
    ['퇴직금 적립', sev ? fmtM(sev.value) : '—'],
  ].map(([lb, vl]) => `<div class="hcell"><div class="lb">${lb}</div><div class="vl">${vl}</div></div>`).join('');

  /* 월 배당 추정 (배당수익률 입력된 종목만) */
  const mDiv = M.holdings.reduce((s, h) => s + (h.yld ? h.value * h.yld / 100 / 12 : 0), 0);

  /* 계좌 합계 */
  const byAcct = {};
  M.holdings.forEach(h => byAcct[h.acct] = (byAcct[h.acct] || 0) + h.value);
  M.cash.forEach(csh => byAcct[csh.acct] = (byAcct[csh.acct] || 0) + csh.krw + csh.usd * fx);
  const pensionNow = (byAcct['KB증권IRP'] || 0) + (byAcct['KB증권연금저축'] || 0);
  const isaNow = byAcct['미래에셋ISA'] || 0;

  /* 목표 게이지 */
  const goals = [
    ['월 배당수입', mDiv, M.targets['월 배당수입 목표'], '월'],
    ['IRP + 연금저축', pensionNow, M.targets['IRP+연금저축 목표'], ''],
    ['퇴직금 적립', sev?.value ?? 0, M.targets['퇴직금 목표'], ''],
    ['ISA', isaNow, M.targets['ISA 목표'], ''],
  ].filter(g => g[2]);
  $('goals').innerHTML = goals.map(([nm, cur, tgt, unit]) => {
    const pct = Math.min(cur / tgt * 100, 100);
    return `<div class="goal ${pct >= 100 ? 'done' : ''}">
      <div class="goal-head"><b>${nm}</b>
        <span class="num">${unit === '월' ? fmtW(cur) + '/월' : fmtM(cur)} / ${fmtM(tgt)} <span class="goal-pct">${(cur/tgt*100).toFixed(1)}%</span></span></div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
  }).join('');

  /* 은퇴 소득 플랜 */
  const ages = Object.keys(M.plan).map(Number).sort((a, b) => a - b);
  const maxMonthly = Math.max(...ages.map(a => M.plan[a].reduce((s, p) => s + p.amount, 0)), 1);
  const srcOrder = Object.keys(PLAN_COLORS);
  $('plan').style.gridTemplateColumns = `repeat(${ages.length},1fr)`;
  $('plan-lb').style.gridTemplateColumns = `repeat(${ages.length},1fr)`;
  $('plan').innerHTML = ages.map(a => {
    const items = [...M.plan[a]].sort((x, y) => srcOrder.indexOf(x.source) - srcOrder.indexOf(y.source));
    const sum = items.reduce((s, p) => s + p.amount, 0);
    return `<div class="plan-col" title="${a}세 합계 ${fmtW(sum)}">
      <span class="top">${Math.round(sum/1e4)}만</span>
      ${items.map(p => `<div class="seg" style="height:${p.amount/maxMonthly*100}%;background:${PLAN_COLORS[p.source] || 'var(--mut)'}" title="${esc(p.source)} ${fmtW(p.amount)}"></div>`).join('')}
    </div>`;
  }).join('');
  $('plan-lb').innerHTML = ages.map(a =>
    `<div><div class="age">${a}세</div><div class="yr">${AGE_ANCHOR.year + (a - AGE_ANCHOR.age)}</div></div>`).join('');
  const usedSrc = new Set(ages.flatMap(a => M.plan[a].map(p => p.source)));
  $('plan-legend').innerHTML = srcOrder.filter(s => usedSrc.has(s))
    .map(s => `<span><i style="background:${PLAN_COLORS[s]}"></i>${s}</span>`).join('');

  /* 계좌별 자산 바 */
  const acctList = Object.entries(byAcct).sort((a, b) => b[1] - a[1]);
  const maxAcct = acctList[0]?.[1] || 1;
  $('accts').innerHTML = acctList.map(([nm, v]) =>
    `<div class="acct"><div class="acct-head"><b>${esc(nm)}</b><span class="num">${fmtM(v)} · ${(v/total*100).toFixed(1)}%</span></div>
     <div class="bar"><i style="width:${v/maxAcct*100}%"></i></div></div>`).join('');

  /* 보유종목 (계좌별 그룹, 평가액순) */
  const grpOrder = acctList.map(([nm]) => nm);
  $('holdings').innerHTML = grpOrder.map(acct => {
    const hs = M.holdings.filter(h => h.acct === acct).sort((a, b) => b.value - a.value);
    if (!hs.length) return '';
    const sub = hs.reduce((s, h) => s + h.value, 0);
    return `<div class="grp"><div class="grp-head"><b>${esc(acct)}</b><span class="num">${fmtM(sub)}</span></div>
      ${hs.map(h => {
        const pnlH = h.value - h.cost, pctH = h.cost ? pnlH / h.cost * 100 : 0;
        const cls = pnlH >= 0 ? 'up' : 'dn', sign = pnlH >= 0 ? '+' : '';
        const chg = h.chgPct == null ? '' : ` · 오늘 ${h.chgPct >= 0 ? '+' : ''}${h.chgPct.toFixed(2)}%`;
        return `<div class="h-row ${h.est ? 'stale' : ''}">
          <div class="h-name"><b>${esc(h.name)}${h.est ? ' <span class="badge-est">시세없음·평단기준</span>' : ''}</b>
            <small>${esc(h.key || '—')} · ${h.qty}주</small></div>
          <div class="h-val"><div class="v">${fmtW(h.value)}</div>
            <div class="c ${cls}">${sign}${pctH.toFixed(1)}%${chg}</div></div></div>`;
      }).join('')}</div>`;
  }).join('');

  $('fx-note').textContent = `환율 $1 = ₩${fx.toFixed(1)} 적용 · 시세 확보 ${liveCount}/${M.holdings.length}종목 · 월 배당 추정은 시트에 배당수익률이 입력된 종목만 합산`;
}

/* ══════════ 메인 ══════════ */
async function loadAll(force) {
  const dot = $('dot'), label = $('dot-label');
  dot.className = 'dot loading'; label.textContent = '불러오는 중';
  if (force) Object.keys(localStorage).filter(k => k.startsWith('q_') || k.startsWith('m_')).forEach(k => localStorage.removeItem(k));
  loadMacros().catch(console.warn);          // 매크로는 시트와 독립적으로 로드
  try {
    const csv = await fetchVia(SHEET_CSV);
    const M = buildModel(parseCSV(csv));
    if (!M.holdings.length) throw new Error('시트에서 보유종목을 찾지 못함');
    $('total-sub').textContent = `시세 조회 중… (${M.holdings.length}종목)`;

    let fx = 1380;
    try { fx = (await getQuote('KRW=X')).price; } catch (e) {}
    const quotes = await pooled(M.holdings, h => getQuoteWithFallback(h, fx), 6);

    render(M, quotes, fx);
    dot.className = 'dot ok';
    const t = new Date();
    label.textContent = `${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 업데이트`;
    $('status-line').textContent = `기준일 ${M.settings['기준일'] || '—'} · 조회 ${t.toLocaleString('ko-KR')}`;
  } catch (err) {
    dot.className = 'dot err'; label.textContent = '실패 · 탭하여 재시도';
    $('status-line').textContent = '오류: ' + err.message;
    console.error(err);
  }
}
renderDday();
loadAll(false);
setInterval(loadAll, 5 * 60 * 1000, false);
</script>
